<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模擬戦 レギュレーション作成フォーム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBQm14-Bn7YAS_UJlVJ_9m_FJN5RIyr78A",
    authDomain: "regulation-creation-tool.firebaseapp.com",
    projectId: "regulation-creation-tool",
    storageBucket: "regulation-creation-tool.firebasestorage.app",
    messagingSenderId: "743315732081",
    appId: "1:743315732081:web:a2e78a376b403b15e80dd0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window._db = db;
  window._firestoreFns = { collection, getDocs, doc, getDoc };

  window.addEventListener('DOMContentLoaded', () => {
    loadFromFirestore();
  });

  async function loadFromFirestore() {
    showLoading(true);
    try {
      const snap = await getDocs(collection(db, "clauses"));
      const clauses = [];
      snap.forEach(d => clauses.push({ id: d.id, ...d.data() }));
      clauses.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));

      const pSnap = await getDocs(collection(db, "presets"));
      const presets = [];
      pSnap.forEach(d => presets.push({ id: d.id, ...d.data() }));

      window._CLAUSES = clauses;
      window._PRESETS = presets;
      initState();
      renderSidebar();
      renderAll();
    } catch(e) {
      console.error(e);
      document.getElementById('load-error').style.display = 'block';
    }
    showLoading(false);
  }

  function showLoading(v) {
    document.getElementById('loading').style.display = v ? 'flex' : 'none';
  }
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;500;700&display=swap');
  :root {
    --bg:#1a1c1f; --panel:#22252a; --card:#2a2e35; --border:#3a3f4a;
    --accent:#c8a84b; --accent2:#7ab3c8; --text:#d4d8df; --text-dim:#7a8090;
    --danger:#c85a5a; --green:#6ab87a; --disabled:#3a3f4a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;min-height:100vh;}

  /* Loading */
  #loading{position:fixed;inset:0;background:rgba(26,28,31,0.92);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #load-error{display:none;background:rgba(200,90,90,0.15);border:1px solid var(--danger);color:var(--danger);padding:14px 20px;border-radius:6px;margin:16px 24px;font-size:13px;}

  header{background:var(--panel);border-bottom:2px solid var(--accent);padding:16px 28px;display:flex;align-items:center;gap:16px;}
  .h-icon{font-size:26px;filter:drop-shadow(0 0 8px var(--accent));}
  header h1{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--accent);letter-spacing:.1em;text-shadow:0 0 12px rgba(200,168,75,.4);}
  header .sub{font-size:11px;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;margin-top:2px;}
  .admin-link{margin-left:auto;font-size:11px;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);padding:5px 12px;border-radius:4px;transition:.15s;}
  .admin-link:hover{color:var(--accent);border-color:var(--accent);}

  .main{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 65px);}

  /* Sidebar */
  .sidebar{background:var(--panel);border-right:1px solid var(--border);padding:18px 14px;display:flex;flex-direction:column;gap:7px;}
  .sb-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.2em;text-transform:uppercase;padding:0 4px 8px;border-bottom:1px solid var(--border);margin-bottom:3px;}
  .preset-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:4px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;text-align:left;transition:.15s;line-height:1.4;}
  .preset-btn:hover{border-color:var(--accent);color:var(--accent);}
  .preset-btn.active{background:rgba(200,168,75,.12);border-color:var(--accent);color:var(--accent);}
  .preset-btn .pd{display:block;font-size:10px;color:var(--text-dim);margin-top:2px;}
  .sb-div{border:none;border-top:1px solid var(--border);margin:6px 0;}
  .reset-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:7px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:.15s;}
  .reset-btn:hover{border-color:var(--danger);color:var(--danger);}

  /* Content */
  .content{padding:22px 28px;overflow-y:auto;}
  .sec-title{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.25em;text-transform:uppercase;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
  .sec-title::before{content:'';display:inline-block;width:3px;height:13px;background:var(--accent);border-radius:2px;}

  /* Clause Card */
  .clause-card{background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:10px;transition:border-color .15s,opacity .2s;overflow:hidden;}
  .clause-card.disabled{opacity:.4;}
  .clause-card.enabled{border-left:3px solid var(--accent);}
  .clause-header{display:flex;align-items:center;gap:10px;padding:12px 14px;user-select:none;}
  .toggle-sw{position:relative;width:36px;height:19px;flex-shrink:0;cursor:pointer;}
  .toggle-sw input{opacity:0;width:0;height:0;}
  .toggle-sl{position:absolute;inset:0;background:var(--disabled);border-radius:20px;transition:.2s;cursor:pointer;}
  .toggle-sl::before{content:'';position:absolute;width:13px;height:13px;left:3px;top:3px;background:var(--text-dim);border-radius:50%;transition:.2s;}
  .toggle-sw input:checked+.toggle-sl{background:rgba(200,168,75,.3);}
  .toggle-sw input:checked+.toggle-sl::before{transform:translateX(17px);background:var(--accent);}
  .cl-num{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);min-width:28px;}
  .cl-title{font-size:13px;font-weight:500;flex:1;}
  .type-tag{font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 6px;border-radius:3px;letter-spacing:.08em;}
  .tag-num{background:rgba(122,179,200,.15);color:var(--accent2);border:1px solid rgba(122,179,200,.3);}
  .tag-sel{background:rgba(106,184,122,.15);color:var(--green);border:1px solid rgba(106,184,122,.3);}
  .tag-combo{background:rgba(200,168,75,.15);color:var(--accent);border:1px solid rgba(200,168,75,.3);}

  .clause-body{padding:0 14px 14px 52px;display:flex;flex-direction:column;gap:10px;}
  .clause-body.hidden{display:none;}

  .num-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .num-label{font-size:12px;color:var(--text-dim);min-width:55px;}
  .num-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:4px;width:75px;font-family:'Share Tech Mono',monospace;font-size:13px;transition:.15s;}
  .num-input:focus{outline:none;border-color:var(--accent2);}
  .num-unit{font-size:12px;color:var(--text-dim);}

  .option-group{display:flex;flex-direction:column;gap:7px;}
  .option-item{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:.15s;}
  .option-item:hover{border-color:var(--accent);}
  .option-item.selected{border-color:var(--accent);background:rgba(200,168,75,.06);}
  .radio-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:.15s;}
  .option-item.selected .radio-dot{border-color:var(--accent);}
  .radio-dot::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:0;transition:.15s;}
  .option-item.selected .radio-dot::after{opacity:1;}
  .opt-text{font-size:13px;line-height:1.5;flex:1;}
  .opt-inputs{margin-top:7px;padding-left:24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

  .sub-opt{display:flex;align-items:center;gap:9px;padding:7px 11px;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:4px;cursor:pointer;margin-top:8px;}
  .check-box{width:15px;height:15px;border:2px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;font-size:10px;color:transparent;}
  .sub-opt.checked .check-box{border-color:var(--accent);background:rgba(200,168,75,.2);color:var(--accent);}
  .sub-opt-text{font-size:12px;color:var(--text-dim);}
  .sub-opt.checked .sub-opt-text{color:var(--text);}

  /* Output */
  .out-sec{margin-top:24px;}
  .btn-row{display:flex;gap:9px;margin-bottom:12px;flex-wrap:wrap;}
  .action-btn{padding:9px 18px;border-radius:4px;border:none;font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;font-weight:500;transition:.15s;display:flex;align-items:center;gap:6px;}
  .btn-pdf{background:var(--danger);color:#fff;}
  .btn-pdf:hover{background:#d96060;}
  .btn-word{background:rgba(122,179,200,.2);color:var(--accent2);border:1px solid var(--accent2);}
  .btn-word:hover{background:rgba(122,179,200,.3);}
  .btn-prev{background:rgba(200,168,75,.15);color:var(--accent);border:1px solid var(--accent);}
  .btn-prev:hover{background:rgba(200,168,75,.25);}

  /* Modal */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:100;}
  .modal-ov.open{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--accent);border-radius:8px;width:660px;max-width:95vw;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;}
  .modal-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .modal-ttl{font-family:'Share Tech Mono',monospace;color:var(--accent);font-size:13px;letter-spacing:.1em;}
  .modal-cls{background:none;border:none;color:var(--text-dim);font-size:17px;cursor:pointer;padding:0 3px;}
  .modal-cls:hover{color:var(--text);}
  .modal-bd{padding:22px;overflow-y:auto;font-size:13px;line-height:1.9;color:var(--text);}
  .modal-bd h2{font-size:15px;text-align:center;margin-bottom:5px;}
  .doc-sub{text-align:center;font-size:11px;color:var(--text-dim);margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .doc-cl{margin-bottom:9px;}
  .doc-cn{color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:12px;}

  @media print{
    header,.sidebar,.out-sec .btn-row,.modal-ov{display:none!important;}
    .main{display:block;}
    body{background:#fff;color:#000;}
    .clause-card{border-color:#ccc;background:#fff;}
    .clause-body.hidden{display:none!important;}
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span style="color:var(--text-dim);font-size:13px">データを読み込んでいます…</span>
</div>

<header>
  <div class="h-icon">⚙️</div>
  <div>
    <h1>REGULATION FORM</h1>
    <div class="sub">Minecraft Military · 模擬戦 レギュレーション作成フォーム</div>
  </div>
  <a class="admin-link" href="admin.html">管理者ページ →</a>
</header>

<div id="load-error">⚠️ データの読み込みに失敗しました。Firestoreの設定を確認してください。</div>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="sb-label">📋 プリセット</div>
    <div id="preset-list"></div>
    <hr class="sb-div">
    <button class="reset-btn" onclick="applyReset()">🔄 全リセット</button>
    <hr class="sb-div">
    <div class="sb-label" style="margin-top:4px">凡例</div>
    <div style="display:flex;flex-direction:column;gap:5px;padding:4px">
      <span class="type-tag tag-num" style="align-self:flex-start">NUM</span>
      <span style="font-size:11px;color:var(--text-dim)">数値入力</span>
      <span class="type-tag tag-sel" style="align-self:flex-start">SELECT</span>
      <span style="font-size:11px;color:var(--text-dim)">条文選択</span>
      <span class="type-tag tag-combo" style="align-self:flex-start">COMBO</span>
      <span style="font-size:11px;color:var(--text-dim)">選択＋数値</span>
    </div>
  </aside>

  <main class="content">
    <div class="sec-title">条文一覧</div>
    <div id="clauses-container"></div>

    <div class="out-sec">
      <div class="sec-title">出力</div>
      <div class="btn-row">
        <button class="action-btn btn-prev" onclick="openPreview()">👁 プレビュー</button>
        <button class="action-btn btn-pdf" onclick="printPDF()">📄 PDFで保存</button>
        <button class="action-btn btn-word" onclick="downloadWord()">📝 Wordで保存</button>
      </div>
    </div>
  </main>
</div>

<!-- Preview Modal -->
<div class="modal-ov" id="modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-ttl">REGULATION PREVIEW</span>
      <button class="modal-cls" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-bd" id="preview-content"></div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let state = {};

function initState() {
  state = {};
  (window._CLAUSES || []).forEach(c => {
    state[c.id] = { enabled: c.defaultEnabled ?? true };
    if (c.type === 'num') {
      state[c.id].inputs = {};
      (c.inputs || []).forEach(inp => { state[c.id].inputs[inp.id] = inp.default ?? 0; });
    } else {
      const firstOpt = (c.options || [])[0];
      state[c.id].selectedOption = firstOpt ? firstOpt.id : null;
      (c.options || []).forEach(opt => {
        if (opt.inputs) {
          state[c.id][opt.id] = {};
          opt.inputs.forEach(inp => { state[c.id][opt.id][inp.id] = inp.default ?? 0; });
        }
        (opt.subOptions || []).forEach(sub => {
          state[c.id][sub.id] = { checked: sub.defaultChecked ?? false, inputs: {} };
          (sub.inputs || []).forEach(si => { state[c.id][sub.id].inputs[si.id] = si.default ?? 0; });
        });
      });
    }
  });
}

// ── Presets ──────────────────────────────────────────────────────────────────
function applyPreset(preset) {
  const clauses = window._CLAUSES || [];
  clauses.forEach(c => {
    const ps = preset.config?.[c.id];
    if (!ps) return;
    if (ps.enabled !== undefined) state[c.id].enabled = ps.enabled;
    if (ps.selectedOption) state[c.id].selectedOption = ps.selectedOption;
    if (ps.inputs) Object.assign(state[c.id].inputs || {}, ps.inputs);
    (c.options || []).forEach(opt => {
      if (ps[opt.id]) {
        state[c.id][opt.id] = state[c.id][opt.id] || {};
        Object.assign(state[c.id][opt.id], ps[opt.id]);
      }
      (opt.subOptions || []).forEach(sub => {
        if (ps[sub.id]) {
          state[c.id][sub.id] = state[c.id][sub.id] || { checked: false, inputs: {} };
          if (ps[sub.id].checked !== undefined) state[c.id][sub.id].checked = ps[sub.id].checked;
          if (ps[sub.id].inputs) Object.assign(state[c.id][sub.id].inputs, ps[sub.id].inputs);
        }
      });
    });
  });
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pb-' + preset.id)?.classList.add('active');
  renderAll();
}

function applyReset() {
  initState();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  renderAll();
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('preset-list');
  list.innerHTML = '';
  (window._PRESETS || []).forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.id = 'pb-' + p.id;
    btn.innerHTML = `${p.name}<span class="pd">${p.description || ''}</span>`;
    btn.onclick = () => applyPreset(p);
    list.appendChild(btn);
  });
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderAll() {
  const container = document.getElementById('clauses-container');
  container.innerHTML = '';
  (window._CLAUSES || []).forEach((c, idx) => {
    const s = state[c.id];
    const card = document.createElement('div');
    card.className = 'clause-card' + (s.enabled ? ' enabled' : ' disabled');
    card.id = 'card-' + c.id;
    const tagClass = c.type === 'num' ? 'tag-num' : c.type === 'select' ? 'tag-sel' : 'tag-combo';
    const tagLabel = c.type === 'num' ? 'NUM' : c.type === 'select' ? 'SELECT' : 'COMBO';
    card.innerHTML = `
      <div class="clause-header">
        <label class="toggle-sw">
          <input type="checkbox" ${s.enabled ? 'checked' : ''} onchange="setEnabled('${c.id}', this.checked)">
          <span class="toggle-sl"></span>
        </label>
        <span class="cl-num">${String(idx+1).padStart(2,'0')}</span>
        <span class="cl-title">${c.title}</span>
        <span class="type-tag ${tagClass}">${tagLabel}</span>
      </div>
      <div class="clause-body ${s.enabled ? '' : 'hidden'}" id="body-${c.id}">
        ${renderBody(c)}
      </div>`;
    container.appendChild(card);
  });
}

function renderBody(c) {
  const s = state[c.id];
  if (c.type === 'num') {
    return `<div class="num-group">${(c.inputs||[]).map(inp => `
      <span class="num-label">${inp.label}</span>
      <input class="num-input" type="number" min="1" value="${s.inputs?.[inp.id] ?? inp.default}"
        oninput="setNumInput('${c.id}',null,'${inp.id}',this.value)">
      ${inp.unit ? `<span class="num-unit">${inp.unit}</span>` : ''}
    `).join('')}</div>`;
  }
  return `<div class="option-group">${(c.options||[]).map(opt => renderOption(c, opt)).join('')}</div>`;
}

function renderOption(c, opt) {
  const s = state[c.id];
  const sel = s.selectedOption === opt.id;
  let html = `<div class="option-item ${sel?'selected':''}" id="opt-${c.id}-${opt.id}" onclick="selectOption('${c.id}','${opt.id}')">
    <span class="radio-dot"></span><div style="flex:1">
    <span class="opt-text">${opt.label}</span>`;
  if (opt.inputs && sel) {
    html += `<div class="opt-inputs">${opt.inputs.map(inp => `
      <span class="num-label">${inp.label}</span>
      <input class="num-input" type="number" min="1" value="${(s[opt.id]||{})[inp.id]??inp.default}"
        oninput="setNumInput('${c.id}','${opt.id}','${inp.id}',this.value)" onclick="event.stopPropagation()">
      ${inp.unit?`<span class="num-unit">${inp.unit}</span>`:''}
    `).join('')}</div>`;
  }
  if (opt.subOptions && sel) {
    opt.subOptions.forEach(sub => {
      const ss = s[sub.id] || { checked: false, inputs: {} };
      html += `<div class="sub-opt ${ss.checked?'checked':''}" id="sub-${c.id}-${sub.id}"
        onclick="toggleSub('${c.id}','${sub.id}',event)">
        <span class="check-box">✓</span>
        <span class="sub-opt-text">${sub.label}</span></div>`;
      if (ss.checked && sub.inputs) {
        html += `<div class="opt-inputs">${sub.inputs.map(si => `
          <span class="num-label">${si.label}</span>
          <input class="num-input" type="number" min="1" value="${ss.inputs?.[si.id]??si.default}"
            oninput="setSubInput('${c.id}','${sub.id}','${si.id}',this.value)" onclick="event.stopPropagation()">
          ${si.unit?`<span class="num-unit">${si.unit}</span>`:''}
        `).join('')}</div>`;
      }
    });
  }
  html += `</div></div>`;
  return html;
}

// ── Mutators ─────────────────────────────────────────────────────────────────
function setEnabled(id, val) {
  state[id].enabled = val;
  document.getElementById('card-'+id).className = 'clause-card'+(val?' enabled':' disabled');
  document.getElementById('body-'+id).className = 'clause-body'+(val?'':' hidden');
}
function selectOption(cid, oid) {
  state[cid].selectedOption = oid;
  document.getElementById('body-'+cid).innerHTML = renderBody(window._CLAUSES.find(x=>x.id===cid));
}
function setNumInput(cid, oid, iid, val) {
  const v = parseFloat(val) || 0;
  if (oid) { state[cid][oid] = state[cid][oid]||{}; state[cid][oid][iid] = v; }
  else { state[cid].inputs[iid] = v; }
}
function toggleSub(cid, sid, e) {
  e.stopPropagation();
  state[cid][sid] = state[cid][sid]||{checked:false,inputs:{}};
  state[cid][sid].checked = !state[cid][sid].checked;
  document.getElementById('body-'+cid).innerHTML = renderBody(window._CLAUSES.find(x=>x.id===cid));
}
function setSubInput(cid, sid, iid, val) {
  state[cid][sid].inputs[iid] = parseFloat(val)||0;
}

// ── Text generation ───────────────────────────────────────────────────────────
function buildClauseText(c) {
  const s = state[c.id];
  if (!s.enabled) return null;
  try {
    if (c.type === 'num') {
      return interpolate(c.textTemplate, s.inputs);
    }
    const opt = (c.options||[]).find(o => o.id === s.selectedOption);
    if (!opt) return null;
    const vals = s[opt.id] || {};
    let text = interpolate(opt.textTemplate, vals);
    (opt.subOptions||[]).forEach(sub => {
      const ss = s[sub.id];
      if (ss?.checked) text += interpolate(sub.textTemplate, ss.inputs||{});
    });
    return text;
  } catch(e) { return '（テキスト生成エラー）'; }
}

function interpolate(template, vals) {
  if (!template) return '';
  return template.replace(/\{\{(\w+)\}\}/g, (_, k) => vals?.[k] ?? '?');
}

function generateAll() {
  const lines = [];
  let n = 1;
  (window._CLAUSES||[]).forEach(c => {
    const t = buildClauseText(c);
    if (t) { lines.push({ num: n, text: t }); n++; }
  });
  return lines;
}

// ── Preview ───────────────────────────────────────────────────────────────────
function openPreview() {
  const lines = generateAll();
  const now = new Date().toLocaleDateString('ja-JP');
  let html = `<h2>模擬戦 レギュレーション</h2><div class="doc-sub">作成日: ${now} ／ Minecraft Military</div>`;
  lines.forEach(l => { html += `<div class="doc-cl"><span class="doc-cn">第${l.num}条　</span>${l.text}</div>`; });
  document.getElementById('preview-content').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function printPDF() { openPreview(); setTimeout(() => window.print(), 400); }

// ── Word ──────────────────────────────────────────────────────────────────────
async function downloadWord() {
  const { Document, Paragraph, TextRun, HeadingLevel, AlignmentType, Packer } = docx;
  const lines = generateAll();
  const now = new Date().toLocaleDateString('ja-JP');
  const children = [
    new Paragraph({ text:'模擬戦 レギュレーション', heading:HeadingLevel.HEADING_1, alignment:AlignmentType.CENTER }),
    new Paragraph({ children:[new TextRun({text:`作成日: ${now}　／　Minecraft Military`,size:20,color:'888888'})], alignment:AlignmentType.CENTER }),
    new Paragraph({ text:'' }),
    ...lines.map(l => new Paragraph({
      children:[new TextRun({text:`第${l.num}条　`,bold:true,size:24}),new TextRun({text:l.text,size:24})],
      spacing:{after:160}
    }))
  ];
  const doc = new Document({ sections:[{ children }] });
  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '模擬戦_レギュレーション.docx'; a.click();
  URL.revokeObjectURL(url);
}
